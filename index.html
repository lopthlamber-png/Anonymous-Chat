<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quiz App</title>
<style>
body{
    font-family:Poppins,sans-serif;
    background:#020617;
    color:white;
    padding:20px;
    text-align:center;
}
input, button{
    padding:10px;
    margin:10px;
    border-radius:10px;
    border:none;
}
button{
    background:#3b82f6;
    color:white;
    cursor:pointer;
}
label{
    display:block;
    margin:10px 0;
    padding:10px;
    background:#1f2937;
    border-radius:10px;
    cursor:pointer;
}
</style>
</head>
<body>

<div id="app"></div>

<script>
// ===== SAMPLE QUESTIONS (replace with your JSON) =====
const questions = [
{
    Question: "What is 2 + 2?",
    Answer: "A",
    Options: [
        {Id:"A", Choice:"4"},
        {Id:"B", Choice:"5"},
        {Id:"C", Choice:"6"}
    ]
},
{
    Question: "What is the capital of France?",
    Answer: "B",
    Options: [
        {Id:"A", Choice:"Berlin"},
        {Id:"B", Choice:"Paris"},
        {Id:"C", Choice:"Madrid"}
    ]
}
];

// ===== STATE =====
let username = localStorage.getItem("username");
let current = parseInt(localStorage.getItem("current")) || 0;
let answers = JSON.parse(localStorage.getItem("answers")) || [];

// ===== SAVE STATE =====
function saveState(){
    localStorage.setItem("username", username);
    localStorage.setItem("current", current);
    localStorage.setItem("answers", JSON.stringify(answers));
}

// ===== USERNAME SCREEN =====
function showLogin(){
    document.getElementById("app").innerHTML = `
        <h2>Welcome to the Quiz!</h2>
        <input type="text" id="name" placeholder="Enter your name"><br>
        <button onclick="startQuiz()">Start Quiz</button>
    `;
}

function startQuiz(){
    const nameInput = document.getElementById("name").value;
    if(nameInput){
        username = nameInput;
        current = 0;
        answers = [];
        saveState();
        showQuestion();
    }
}

// ===== SHOW QUESTION =====
function showQuestion(){
    if(current >= questions.length){
        finishQuiz();
        return;
    }

    const q = questions[current];

    let html = `
        <h2>Question ${current+1} of ${questions.length}</h2>
        <h3>${q.Question}</h3>
        <form id="quizForm">
    `;

    q.Options.forEach(opt => {
        const checked = answers[current] === opt.Id ? "checked" : "";
        html += `
            <label>
                <input type="radio" name="answer" value="${opt.Id}" ${checked} required>
                ${opt.Choice}
            </label>
        `;
    });

    if(current > 0){
        html += `<button type="button" onclick="prev()">⬅ Previous</button>`;
    }

    html += `<button type="submit">${current+1 === questions.length ? "Submit Quiz" : "Next Question"}</button>`;
    html += `</form>`;

    document.getElementById("app").innerHTML = html;

    document.getElementById("quizForm").onsubmit = function(e){
        e.preventDefault();
        const selected = document.querySelector('input[name="answer"]:checked');
        if(selected){
            answers[current] = selected.value;
            current++;
            saveState();
            showQuestion();
        }
    };
}

// ===== NAVIGATION =====
function prev(){
    current--;
    saveState();
    showQuestion();
}

// ===== FINISH =====
function finishQuiz(){
    let score = 0;

    questions.forEach((q, i) => {
        if(answers[i] === q.Answer) score++;
    });

    // Save results locally
    const result = {
        name: username,
        score: score,
        total: questions.length
    };

    let allResults = JSON.parse(localStorage.getItem("results")) || [];
    allResults.push(result);
    localStorage.setItem("results", JSON.stringify(allResults));

    // Clear session
    localStorage.removeItem("username");
    localStorage.removeItem("current");
    localStorage.removeItem("answers");

    document.getElementById("app").innerHTML = `
        <h2>Quiz Finished!</h2>
        <h3>${username}, your score is ${score} / ${questions.length}</h3>
        <button onclick="restart()">Restart</button>
    `;
}

function restart(){
    location.reload();
}

// ===== START =====
if(!username){
    showLogin();
}else{
    showQuestion();
}
</script>

</body>
</html>
